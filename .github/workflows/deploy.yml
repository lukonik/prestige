name: deploy

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'github-actions[bot]' || github.actor == 'release-please[bot]' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        # --frozen-lockfile ensures strict installation based on pnpm-lock.yaml
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Publish to npm
        # --no-git-checks skips strict git branch checks which can fail in CI
        run: pnpm run prestige:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
