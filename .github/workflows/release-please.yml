on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Automatically provided by GitHub Actions to create PRs/Tags
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # Run these steps ONLY if a release was just created
      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Install pnpm
        if: ${{ steps.release.outputs.release_created }}
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        # --frozen-lockfile ensures strict installation based on pnpm-lock.yaml
        run: pnpm install --frozen-lockfile

      - name: Build project
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm run build

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        # --no-git-checks skips strict git branch checks which can fail in CI
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
