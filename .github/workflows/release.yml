name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org" # REQUIRED: Tells setup-node to create an .npmrc file

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        # CHANGED: Run build recursively from the root so both create-prestige and prestige are built
        run: pnpm -r run build

      - name: Release packages
        # CHANGED: Removed working-directory so semantic-release runs at the root
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # CHANGED: setup-node specifically looks for NODE_AUTH_TOKEN
        run: pnpm exec semantic-release
