name: validate-pr

on:
  pull_request:
    branches: [main]
    # Added types to ensure the check re-runs if you rename the PR
    types:
      - opened
      - edited
      - synchronize

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Required for some linters to see the history/context
          fetch-depth: 0

      - name: Validate PR Title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright
        run: pnpm dlx playwright install

      # - name: Lint
      #   run: pnpm run lint

      # - name: Format
      #   run: pnpm run fmt

      # - name: Test
      #   run: pnpm run test:all

      - name: Build
        run: pnpm run build:all
